version: "3.9"

services:
  traefik:
    image: traefik:v3.1
    command:
      - --providers.docker=true
      - --providers.docker.swarmMode=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --api.dashboard=false
      - --log.level=INFO
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    networks:
      - edge

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-truew8}
      POSTGRES_USER: ${POSTGRES_USER:-truew8}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.db == true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-truew8} -d ${POSTGRES_DB:-truew8}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api:
    image: ghcr.io/truew8/truew8-api:latest
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-truew8}
      DB_USERNAME: ${POSTGRES_USER:-truew8}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - postgres
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.truew8-api.rule=Host(`${TRAEFIK_DOMAIN}`) && PathPrefix(`/api`)
        - traefik.http.routers.truew8-api.entrypoints=websecure
        - traefik.http.routers.truew8-api.tls=true
        - traefik.http.routers.truew8-api.tls.certresolver=le
        - traefik.http.services.truew8-api.loadbalancer.server.port=8080
    networks:
      - edge
      - backend

volumes:
  letsencrypt_data:
  postgres_data:

networks:
  edge:
    driver: overlay
    attachable: true
  backend:
    driver: overlay
    attachable: true
