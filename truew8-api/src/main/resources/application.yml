spring:
  application:
    name: truew8-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5442}/${DB_NAME:truew8}
    username: ${DB_USERNAME:truew8}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
