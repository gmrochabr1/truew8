spring:
  datasource:
    url: jdbc:h2:mem:truew8;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

app:
  jwt:
    secret: test-jwt-secret-at-least-32-characters-long
    expiration-ms: 3600000
  gemini:
    api-key: test-key
